default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>


development:
  <<: *default
  database: rails_podj_development
  username: <%= ENV["RAILS_PODJ_DEV_DATABASE_USERNAME"] %>
  password: <%= ENV["RAILS_PODJ_DEV_DATABASE_PASSWORD"] %>


test:
  <<: *default
  database: rails_podj_test
  username: <%= ENV["RAILS_PODJ_DEV_DATABASE_USERNAME"] %>
  password: <%= ENV["RAILS_PODJ_DEV_DATABASE_PASSWORD"] %>

production:
  primary: &primary_production
    <<: *default
    database: rails_podj_production
    username: rails_podj
    password: <%= ENV["RAILS_PODJ_DATABASE_PASSWORD"] %>
  cache:
    <<: *primary_production
    database: rails_podj_production_cache
    migrations_paths: db/cache_migrate
  queue:
    <<: *primary_production
    database: rails_podj_production_queue
    migrations_paths: db/queue_migrate
  cable:
    <<: *primary_production
    database: rails_podj_production_cable
    migrations_paths: db/cable_migrate
